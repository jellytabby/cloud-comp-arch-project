apiVersion: batch/v1
kind: Job
metadata:
  name: parsec-streamcluster
  labels:
    name: parsec-streamcluster
spec:
  template:
    spec:
      containers:
      - image: anakli/cca:parsec_streamcluster
        name: parsec-streamcluster
        imagePullPolicy: Always
        command: ["/bin/sh"]
        args: ["-c", "taskset -c 2,3 ./run -a run -S parsec -p streamcluster -i native -n 2"]
      restartPolicy: Never
      nodeSelector:
        cca-project-nodetype: "node-b-4core"
